       <!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>結び時（むすびどき）</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app-container">
        <!-- メイン画面 -->
        <section id="main-screen" class="screen active">
            <div class="top-bar">
                <button id="btn-to-collection" class="menu-icon-btn" title="コレクション画面">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M4 6H2V20C2 21.1 2.9 22 4 22H18V20H4V6ZM20 2H8C6.9 2 6 2.9 6 4V16C6 17.1 6.9 18 8 18H20C21.1 18 22 17.1 22 16V4C22 2.9 21.1 2.2 20 2ZM20 16H8V4H20V16Z" fill="currentColor"/></svg>
                </button>
                <div class="app-title-mini">結び時</div>
                <button id="btn-to-trade" class="menu-icon-btn" title="オンライン交換">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z" fill="currentColor"/></svg>
                </button>
            </div>

            <div class="himo-area">
                <div class="himo-rope-container">
                    <div id="himo-rope"></div>
                    <div id="himo-handle"></div>
                </div>
                <p class="himo-instruction">紐を下に引いてください</p>
            </div>
        </section>

        <!-- コレクション画面 -->
        <section id="collection-screen" class="screen">
            <div class="screen-header">
                <button class="btn-back"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg></button>
                <h2>アルバム</h2>
                <div class="points-badge"><span id="display-points">0</span> pt</div>
            </div>
            
            <div class="collection-actions">
                <button id="btn-recycle-all" class="secondary-btn">ダブリを一括リサイクル (+10pt/枚)</button>
                <button id="btn-draw-premium" class="premium-btn">極レア箱を引く (10pt消費)</button>
            </div>

            <div class="collection-container">
                <div class="series-section">
                    <h3 class="series-title">日常シリーズ</h3>
                    <div class="card-grid" id="grid-daily">
                        <!-- 動的に生成 -->
                    </div>
                </div>
                <div class="series-section">
                    <h3 class="series-title">祝日・特別シリーズ</h3>
                    <div class="card-grid" id="grid-special">
                        <!-- 動的に生成 -->
                    </div>
                </div>
            </div>
        </section>

        <!-- オンライン交換画面 -->
        <section id="trade-screen" class="screen">
            <div class="screen-header">
                <button class="btn-back"><svg viewBox="0 0 24 24" width="24" height="24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" fill="currentColor"/></svg></button>
                <h2>オンライン交換</h2>
                <div></div>
            </div>
            
            <div class="trade-container">
                <div class="trade-user-panel">
                    <h3>あなたの手札</h3>
                    <div class="trade-list" id="my-trade-list"></div>
                </div>
                <div class="trade-user-panel">
                    <h3>友達（オンライン）の手札</h3>
                    <div class="trade-list" id="friend-trade-list"></div>
                </div>
            </div>
            <div class="trade-actions">
                <button id="btn-execute-trade" class="primary-btn" disabled>選択したカードを交換する</button>
            </div>
        </section>

        <!-- カード出現ポップアップモーダル -->
        <div id="card-modal" class="modal">
            <div class="modal-content">
                <div class="tc-card" id="drawn-card-element">
                    <div class="tc-card-inner">
                        <div class="tc-badge" id="modal-card-badge">新規!</div>
                        <h2 class="tc-title" id="modal-card-title">朝の結びカード</h2>
                        <div class="tc-divider"></div>
                        <p class="tc-text" id="modal-card-text">今日の空気はちょっと味方してくれそう。深呼吸をひとつして、お出かけしてみては？</p>
                        <div class="tc-footer" id="modal-card-date">結び日時: 2026-05-27</div>
                    </div>
                </div>
                <button id="btn-close-modal" class="primary-btn">アルバムに結ぶ</button>
            </div>
        </div>
    </div>

    <!-- オーディオ要素（効果音の代わりとなるWeb Audio APIをJSで使用するため、タグは最小限または未使用） -->
    <script src="script.js"></script>
</body>
</html>
